<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link  rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container" autocomplete="off">
        <div id="page">
            <!-- login code start -->
            <div id="login" class="animate__animated animate__flipInX">
               <h1 align="center"><i>Login</i></h1>
               <form id="login_frm">
                <input type="email" required="required"  placeholder="Email Id" id="login_email">
                <small id="login_email_warning"><i class="fas fa-exclamation-triangle"></i> Email id not rejesterd...</small>
                <input type="password" required="required" placeholder="password" id="login_password">
                <small id="login_password_warning"><i class="fas fa-exclamation-triangle"></i>Wrong Password...</small>
                <button type="submit" id="login_btn">Login</button>
               </form>
               <p>Don't have an account? <span id="signup_link">Sign up</span></p>
            </div>
            <!-- login code end -->

            <!-- sign up code start -->
            <div id="signup" class="animate__animated animate__flipInX">
                <h1 align="center"><i>Sign up</i></h1>
                <form id="signup_frm" autocomplete="off">
                <input type="name" required="required" placeholder="Name" id="username">
                <input type="email" required="required" placeholder="email" id="email">
                <small id="email_notice"><i class="fa fa-exclamation-triangle"></i>Email id already exist</small>
                <input type="number" required="required" placeholder="Phone Number" id="phone">
                <input type="password" required="required" placeholder="password" id="password">
                <button type="submit" id="signup_btn">Sign up</button>
                </form>
                <p>Already have an account? <span id="login_link">Login</span></p>

            </div>
        </div>

    </div>
    <!-- start external javascript page -->
    <script src="js/index.js"></script>
    <script src="js/login_signup.js"></script>
    <!-- end external javascript page -->
    
</body>
</html>
